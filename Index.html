<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Centre</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">🎮 Game Centre</div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="#">Games</a></li>
        <li><a href="#">Events</a></li>
        <li><a href="#">Community</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Welcome to Game Centre</h1>
    <p>Play, Compete, Connect</p>
    <button onclick="startGame()">Start Playing</button>
    <button onclick="joinCommunity()">Join Community</button>
  </section>

  <!-- Featured Games -->
  <section class="games">
    <h2>Featured Games</h2>
    <div class="game-grid">
      <div class="game-card">Puzzle Quest</div>
      <div class="game-card">Minecraft Clone</div>
      <div class="game-card">Shadow Fight</div>
    </div>
  </section>

  <!-- News -->
  <section class="news">
    <h2>Latest Updates</h2>
    <div id="news-feed"></div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Game Centre | All Rights Reserved</p>
    <div class="socials">
      <a href="#">YouTube</a> | <a href="#">Discord</a> | <a href="#">Twitter</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
